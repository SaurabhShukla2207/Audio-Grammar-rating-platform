services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audio-grammar-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audio-grammar-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
